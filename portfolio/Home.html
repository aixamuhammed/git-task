<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        header {
            background-color: #222;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: white;
            margin-left: 15px;
            text-decoration: none;
        }

        .hero {
            height: 60vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        .hero h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .btn {
            padding: 10px 20px;
            background: white;
            color: black;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        section {
            padding: 40px;
            text-align: center;
        }

        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

<header>
    <div>My Website</div>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<div class="hero">
    <h1>Welcome to Our Website</h1>
    <p>This is a simple homepage example</p>
    <button class="btn">Get Started</button>
</div>

<section>
    <h2>About Us</h2>
    <p>We are a team working on a Git project and learning collaboration.</p>
</section>

<footer>
    <p>© 2026 My Website. All rights reserved.</p>
</footer>

</body>
</html>
